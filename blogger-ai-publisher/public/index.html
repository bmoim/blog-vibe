<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Blogger AI Publisher</title><link rel="stylesheet" href="/style.css"></head>
<body>
<header class="topbar"><div><p class="eyebrow">CONTENT OPERATING SYSTEM</p><h1>Blogger AI Publisher</h1><p class="subtitle">주제 하나로 조사·SEO 글·이미지·Blogger 발행까지</p></div><div class="top-actions"><span id="connectionBadge" class="badge neutral">상태 확인 중</span><button id="googleButton" class="button secondary">Google 연결</button></div></header>
<main class="layout"><aside class="sidebar"><section class="panel compact"><h2>환경 상태</h2><div id="statusList" class="status-list"></div></section><section class="panel compact"><div class="section-heading"><h2>저장된 초안</h2><button id="refreshDrafts" class="icon-button">↻</button></div><div id="draftList" class="draft-list"><p class="muted">초안이 없습니다.</p></div></section></aside>
<section class="workspace"><section class="panel generator-panel"><div class="section-heading"><div><p class="step">STEP 1</p><h2>콘텐츠 만들기</h2></div><span class="policy-note">검수 후 발행 권장</span></div>
<form id="generateForm" class="form-grid"><label class="field full"><span>글 주제 *</span><textarea id="topic" rows="3" placeholder="예: 2026년 초보자를 위한 ISA 계좌 절세 활용법" required></textarea></label><label class="field"><span>핵심 키워드</span><input id="targetKeyword"></label><label class="field"><span>대상 독자</span><input id="audience" value="검색으로 문제 해결 방법을 찾는 일반 독자"></label><label class="field"><span>글 길이</span><select id="articleLength"><option value="1800">약 1,800자</option><option value="2800" selected>약 2,800자</option><option value="4500">약 4,500자</option><option value="7000">약 7,000자</option></select></label><label class="field"><span>이미지 수</span><select id="imageCount"><option value="0">0장</option><option value="1">1장</option><option value="2" selected>2장</option><option value="3">3장</option><option value="4">4장</option></select></label><label class="field"><span>문체</span><select id="tone"><option>신뢰감 있고 쉽게 설명하는 문체</option><option>친근하지만 전문적인 문체</option><option>데이터 중심의 분석적인 문체</option><option>경험담이 섞인 자연스러운 문체</option></select></label><label class="field"><span>언어</span><select id="language"><option selected>한국어</option><option>English</option><option>日本語</option></select></label><label class="field full"><span>추가 요청</span><textarea id="customInstructions" rows="2"></textarea></label><label class="check-field"><input type="checkbox" id="useWebResearch" checked><span><strong>최신 자료 웹 조사</strong><small>시사·제품·제도·건강·금융 주제에 권장</small></span></label><label class="check-field"><input type="checkbox" id="premiumReview" checked><span><strong>2차 편집장 검수</strong><small>중복과 부정확한 표현을 줄임</small></span></label><button class="button primary full" type="submit">글과 이미지 생성하기</button></form></section>
<section id="editorSection" class="panel editor-panel hidden"><div class="section-heading"><div><p class="step">STEP 2</p><h2>검수하고 발행하기</h2></div><div id="seoScore" class="score-ring">0</div></div><div class="tabs"><button class="tab active" data-tab="preview">미리보기</button><button class="tab" data-tab="edit">HTML 수정</button><button class="tab" data-tab="seo">SEO 점검</button></div><div id="previewTab" class="tab-content active"><article id="articlePreview" class="article-preview"></article></div><div id="editTab" class="tab-content"><div class="form-grid"><label class="field full"><span>제목</span><input id="editTitle"></label><label class="field full"><span>메타 설명</span><textarea id="editMeta" rows="2"></textarea></label><label class="field full"><span>라벨</span><input id="editLabels"></label><label class="field full"><span>본문 HTML</span><textarea id="editBody" class="code-editor" rows="20"></textarea></label><button id="saveDraftButton" class="button secondary full">수정사항 저장</button></div></div><div id="seoTab" class="tab-content"><div id="seoChecks" class="seo-checks"></div></div><div class="publish-box"><div class="publish-controls"><label class="field grow"><span>Blogger 블로그</span><select id="blogSelect"><option value="">Google 연결 후 선택</option></select></label><label class="check-field inline"><input type="checkbox" id="publishWithoutImages"><span><strong>이미지 없이 발행</strong></span></label></div><div class="publish-buttons"><button id="publishDraftButton" class="button secondary">Blogger 초안으로 보내기</button><button id="publishLiveButton" class="button danger">검수 완료 · 공개 발행</button></div><p id="publishResult" class="muted"></p></div></section></section></main>
<div id="loadingOverlay" class="loading-overlay hidden"><div class="loader-card"><div class="spinner"></div><h2 id="loadingTitle">콘텐츠를 만들고 있습니다</h2><p id="loadingMessage">조사 → 글 작성 → 편집 검수 → 이미지 생성</p></div></div><div id="toast" class="toast hidden"></div><script src="/app.js" type="module"></script></body></html>
