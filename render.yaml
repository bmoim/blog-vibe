services:
  - type: web
    name: bmoim-blogger-ai-publisher
    runtime: node
    region: singapore
    plan: starter
    buildCommand: rm -rf .deployed-app && mkdir .deployed-app && base64 -d bundle/blogger-ai-source.tar.gz.b64 | tar -xz -C .deployed-app && cd .deployed-app && npm install --omit=dev
    startCommand: cd .deployed-app && npm start
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        value: gpt-5.6
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: OPENAI_IMAGE_QUALITY
        value: medium
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: IMAGE_HOST_MODE
        value: cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: DAILY_GENERATION_LIMIT
        value: "10"
      - key: DATA_DIR
        value: /var/data/app-data
      - key: GENERATED_DIR
        value: /var/data/generated
    disk:
      name: blogger-ai-data
      mountPath: /var/data
      sizeGB: 1
